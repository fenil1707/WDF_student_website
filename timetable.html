<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Timetable</title>
</head>
<body>
    <main>
        <section>
            <h1>Weekly Timetable</h1>
            <table border="1">
                <thead>
                    <tr>
                        <th>Day</th>
                        <th>9:00 - 10:00</th>
                        <th>10:00 - 11:00</th>
                        <th>11:00 - 12:00</th>
                        <th>12:00 - 1:00<br><small>BREAK</small></th>
                        <th>1:00 - 2:00</th>
                        <th>2:00 - 3:00</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Monday</td>
                        <td>DBMS</td>
                        <td>OS</td>
                        <td>WT</td>
                        <td rowspan="5"><b>BREAK</b></td>
                        <td>WDF</td>
                        <td>TOC</td>
                    </tr>
                    <tr>
                        <td>Tuesday</td>
                        <td>TOC</td>
                        <td>DSA</td>
                        <td>ML</td>
                        <td>WEB3</td>
                        <td>DBMS</td>
                    </tr>
                    <tr>
                        <td>Wednesday</td>
                        <td>OS</td>
                        <td>ML</td>
                        <td>WEB3</td>
                        <td>DSA</td>
                        <td>CN</td>
                    </tr>
                    <tr>
                        <td>Thursday</td>
                        <td>CN</td>
                        <td>DBMS</td>
                        <td>ML</td>
                        <td>AI</td>
                        <td>DSA</td>
                    </tr>
                    <tr>
                        <td>Friday</td>
                        <td>DSA</td>
                        <td>DBMS</td>
                        <td>WT</td>
                        <td>ML</td>
                        <td>DSA</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
