<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentHub - Register</title>
</head>
<body>
    <header>
        <h1>StudentHub</h1>
        <p>Student Registration Portal</p>
    </header>
    <hr>
    <main>
        <section>
            <h2>Student Registration</h2>
            <p>
                Create your StudentHub account by filling in the details below.
            </p>
            <form action="login.html" method="get">
                <fieldset>
                    <legend>Registration Details</legend>
                    <p>
                        <label for="name">Full Name:</label><br>
                        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                    </p>
                    <p>
                        <label for="id">Student ID:</label><br>
                        <input type="text" id="id" name="id" placeholder="Enter Student ID" required>
                    </p>
                    <p>
                        <label for="email">Email Address:</label><br>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </p>
                    <p>
                        <label for="password">Password:</label><br>
                        <input type="password" id="password" name="password" placeholder="Minimum 8 characters"
                            minlength="8" required>
                    </p>
                    <p>
                        <label for="confirmPassword">Confirm Password:</label><br>
                        <input type="password" id="confirmPassword" name="confirmPassword"
                            placeholder="Re-enter password" minlength="8" required>
                    </p>
                    <p>
                        <input type="submit" value="Register">
                        <input type="reset" value="Clear">
                    </p>
                </fieldset>
            </form>
            <p>
                <a href="login.html">Login Here</a>
            </p>
        </section>
    </main>
   <hr>
</body>
</html>
